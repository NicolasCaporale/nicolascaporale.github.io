<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferma Email — Aura Foods</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #f0f7f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 48px 36px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(13,51,32,0.10);
    }
    .emoji { font-size: 64px; margin-bottom: 20px; }
    .title {
      font-family: 'Fredoka One', cursive;
      font-size: 26px;
      color: #0d3320;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      color: #4a6358;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #1a5c3a, #2d8653);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      padding: 16px 40px;
      border-radius: 50px;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .88; }
    .badge {
      display: inline-block;
      background: #e8f5ee;
      color: #1a5c3a;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      padding: 4px 14px;
      border-radius: 50px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="stato">
      <div class="emoji">⏳</div>
      <div class="title">Verifica in corso…</div>
    </div>
  </div>

  <script>
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    (async function () {
      const fromHash  = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const fromQuery = new URLSearchParams(window.location.search);

      const type    = fromHash.get('type')    || fromQuery.get('type');
      const message = fromHash.get('message') || fromQuery.get('message');
      const stato   = document.getElementById('stato');

      // ── SIGNUP ──────────────────────────────────────────────────────
      if (type === 'signup') {
        await _supabase.auth.signOut();
        stato.innerHTML = `
          <div class="emoji">🥑</div>
          <div class="badge">Account confermato</div>
          <div class="title">Benvenuto su Aura Foods!</div>
          <div class="subtitle">Il tuo account è attivo.<br>Accedi per iniziare.</div>
          <a class="btn" href="https://aura-foods.it">Accedi ora →</a>
        `;

      // ── EMAIL CHANGE (seconda mail, redirect corretto) ───────────────
      } else if (type === 'email_change') {
        await _supabase.auth.signOut();
        stato.innerHTML = `
          <div class="emoji">✉️</div>
          <div class="badge">Email aggiornata</div>
          <div class="title">Indirizzo email modificato</div>
          <div class="subtitle">La tua nuova email è stata confermata.<br>Accedi di nuovo con il nuovo indirizzo.</div>
          <a class="btn" href="https://aura-foods.it">Accedi con la nuova email →</a>
        `;

      // ── PRIMA MAIL cambio email ("Confirmation link accepted") ───────
      } else if (message && message.includes('Confirmation link accepted')) {
        stato.innerHTML = `
          <div class="emoji">📬</div>
          <div class="badge">Quasi fatto!</div>
          <div class="title">Conferma la nuova email</div>
          <div class="subtitle">Abbiamo inviato un link al tuo nuovo indirizzo.<br>Aprilo per completare il cambio email.</div>
          <a class="btn" href="https://aura-foods.it">Torna all'app →</a>
        `;

      // ── FALLBACK ─────────────────────────────────────────────────────
      } else {
        stato.innerHTML = `
          <div class="emoji">❌</div>
          <div class="title">Link non valido</div>
          <div class="subtitle">Il link è scaduto o è già stato usato.<br>Riprova dall'app.</div>
          <a class="btn" href="https://aura-foods.it">Torna all'app →</a>
        `;
      }
    })();
  </script>
</body>
</html>
