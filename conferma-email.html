<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferma Email — Aura Foods</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
</head>

<body>
  <div>
    <div id="stato">
      <div>⏳</div>
      <div>Conferma in corso...</div>
    </div>
  </div>

  <script>
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    (async function () {

      const hash = new URLSearchParams(window.location.hash.replace('#', '?'));
      const type = hash.get('type');
      const error = hash.get('error_description');

      const stato = document.getElementById('stato');

      if (error) {
        stato.innerHTML = `
          <div>❌</div>
          <div>Link non valido o scaduto</div>
          <a href="https://aura-foods.it">Torna all'app</a>
        `;
        return;
      }

      if (type === 'signup') {
        await _supabase.auth.signOut();

        stato.innerHTML = `
          <div>🥑</div>
          <div>Email confermata!</div>
          <div>Ora puoi accedere al tuo account</div>
          <a href="https://aura-foods.it">Accedi</a>
        `;
        return;
      }

      if (type === 'email_change') {
        stato.innerHTML = `
          <div>📧</div>
          <div>Email confermata!</div>
          <div>Assicurati di confermare entrambe le email per accedere con la nuova!</div>
          <a href="https://aura-foods.it">Vai al login</a>
        `;
        return;
      }

      // fallback
      stato.innerHTML = `
        <div>❌</div>
        <div>Link non valido</div>
        <a href="https://aura-foods.it">Torna all'app</a>
      `;

    })();
  </script>
</body>
</html>
