name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clona repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Sostituisce i placeholder nel tuo JS
      - name: Inject Supabase secrets
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" js/app.js
          sed -i "s|__SUPABASE_KEY__|${{ secrets.SUPABASE_KEY }}|g" js/app.js

      # 3. Debug (VEDI se ha funzionato)
      - name: Debug output
        run: |
          echo "----- CONTENUTO js/app.js -----"
          cat js/app.js

      # 4. Deploy su GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
