name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject env vars
        run: |
          find . -name "app.js" -exec sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" {} \;
          find . -name "app.js" -exec sed -i "s|__SUPABASE_KEY__|${{ secrets.SUPABASE_KEY }}|g" {} \;

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
